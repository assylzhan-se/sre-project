<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SRE Microservices Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; }
        .header { background: #1e293b; padding: 20px 40px; border-bottom: 2px solid #3b82f6; }
        .header h1 { color: #3b82f6; font-size: 1.8rem; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .service-card { background: #1e293b; border-radius: 10px; padding: 20px; border: 1px solid #334155; }
        .service-card h3 { color: #94a3b8; font-size: 0.9rem; text-transform: uppercase; margin-bottom: 10px; }
        .service-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .status { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }
        .status.healthy { background: #064e3b; color: #34d399; }
        .status.unhealthy { background: #450a0a; color: #f87171; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .status.healthy .status-dot { background: #34d399; animation: pulse 2s infinite; }
        .status.unhealthy .status-dot { background: #f87171; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .port { color: #64748b; font-size: 0.85rem; margin-top: 8px; }
        .actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-primary:hover { background: #2563eb; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .slo-section { background: #1e293b; border-radius: 10px; padding: 25px; border: 1px solid #334155; margin-bottom: 30px; }
        .slo-section h2 { color: #3b82f6; margin-bottom: 20px; }
        .slo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .slo-item { text-align: center; padding: 15px; background: #0f172a; border-radius: 8px; }
        .slo-value { font-size: 2rem; font-weight: bold; color: #34d399; }
        .slo-label { font-size: 0.85rem; color: #64748b; margin-top: 5px; }
        .slo-target { font-size: 0.75rem; color: #475569; margin-top: 3px; }
        .incident-section { background: #1e293b; border-radius: 10px; padding: 25px; border: 1px solid #334155; }
        .incident-section h2 { color: #f59e0b; margin-bottom: 15px; }
        .btn-warning { background: #f59e0b; color: #0f172a; font-weight: bold; }
        .btn-warning:hover { background: #d97706; }
        .btn-success { background: #10b981; color: white; }
        .log { background: #0f172a; border-radius: 6px; padding: 15px; font-family: monospace; font-size: 0.85rem; height: 150px; overflow-y: auto; margin-top: 15px; color: #94a3b8; }
        .log .error { color: #f87171; }
        .log .success { color: #34d399; }
        .log .info { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔷 SRE Microservices Platform</h1>
    </div>
    <div class="container">
        <div class="slo-section">
            <h2>📊 SLO Status</h2>
            <div class="slo-grid">
                <div class="slo-item">
                    <div class="slo-value" id="availability">99.9%</div>
                    <div class="slo-label">Availability</div>
                    <div class="slo-target">Target: ≥ 99%</div>
                </div>
                <div class="slo-item">
                    <div class="slo-value" id="latency">45ms</div>
                    <div class="slo-label">Avg Latency</div>
                    <div class="slo-target">Target: ≤ 200ms</div>
                </div>
                <div class="slo-item">
                    <div class="slo-value" id="error-rate">0.1%</div>
                    <div class="slo-label">Error Rate</div>
                    <div class="slo-target">Target: ≤ 1%</div>
                </div>
            </div>
        </div>

        <div class="services-grid" id="services-grid">
            <!-- Populated by JS -->
        </div>

        <div class="incident-section">
            <h2>⚠️ Incident Simulation</h2>
            <p style="color:#94a3b8; margin-bottom:15px;">Simulate the Order Service database failure incident from Assignment 4.</p>
            <div class="actions">
                <button class="btn btn-warning" onclick="simulateIncident()">🔴 Trigger Incident</button>
                <button class="btn btn-success" onclick="resolveIncident()">✅ Resolve Incident</button>
            </div>
            <div class="log" id="incident-log">
                <span class="info">[INFO] System nominal. All services operational.</span>
            </div>
        </div>
    </div>

    <script>
        const services = [
            { name: "Auth Service", port: 5001, endpoint: "/auth/login" },
            { name: "Product Service", port: 5002, endpoint: "/products" },
            { name: "Order Service", port: 5003, endpoint: "/orders" },
            { name: "Payment Service", port: 5004, endpoint: "/payments" },
            { name: "Notification Service", port: 5005, endpoint: "/notifications" },
            { name: "User Profile Service", port: 5006, endpoint: "/profiles/demo" },
        ];

        function renderServices(statuses) {
            const grid = document.getElementById('services-grid');
            grid.innerHTML = services.map((s, i) => `
                <div class="service-card">
                    <h3>Microservice</h3>
                    <div class="service-name">${s.name}</div>
                    <div class="status ${statuses[i] ? 'healthy' : 'unhealthy'}">
                        <div class="status-dot"></div>
                        ${statuses[i] ? 'Healthy' : 'Unhealthy'}
                    </div>
                    <div class="port">Port: ${s.port} | ${s.endpoint}</div>
                </div>
            `).join('');
        }

        function log(msg, type='info') {
            const logEl = document.getElementById('incident-log');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML += `\n<span class="${type}">[${time}] ${msg}</span>`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function simulateIncident() {
            log('ERROR: Order Service DB connection failed (wrong DB_HOST config)', 'error');
            log('ERROR: Health check /health returning 503', 'error');
            log('ALERT: order_requests_total error rate > 1% threshold', 'error');
            log('ALERT: Prometheus alert fired → PagerDuty notified', 'error');
            renderServices([true, true, false, true, true, true]);
            document.getElementById('error-rate').textContent = '12.5%';
            document.getElementById('error-rate').style.color = '#f87171';
            document.getElementById('availability').textContent = '83.3%';
            document.getElementById('availability').style.color = '#f87171';
        }

        function resolveIncident() {
            log('INFO: Engineer identified wrong DB_HOST env variable', 'info');
            log('INFO: Correcting DB_HOST=postgres in docker-compose.yml', 'info');
            log('INFO: Restarting Order Service container...', 'info');
            setTimeout(() => {
                log('SUCCESS: Order Service restarted successfully', 'success');
                log('SUCCESS: Health check /health returning 200', 'success');
                log('SUCCESS: All metrics normalized. Incident resolved.', 'success');
                renderServices([true, true, true, true, true, true]);
                document.getElementById('error-rate').textContent = '0.1%';
                document.getElementById('error-rate').style.color = '#34d399';
                document.getElementById('availability').textContent = '99.9%';
                document.getElementById('availability').style.color = '#34d399';
            }, 1500);
        }

        // Initial render
        renderServices([true, true, true, true, true, true]);
    </script>
</body>
</html>
