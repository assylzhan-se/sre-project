server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to API services
    location /api/auth/ {
        proxy_pass http://auth:5001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/products/ {
        proxy_pass http://product:5002/;
        proxy_set_header Host $host;
    }

    location /api/orders/ {
        proxy_pass http://order:5003/;
        proxy_set_header Host $host;
    }

    location /api/payments/ {
        proxy_pass http://payment:5004/;
        proxy_set_header Host $host;
    }

    location /api/notifications/ {
        proxy_pass http://notification:5005/;
        proxy_set_header Host $host;
    }

    location /api/profiles/ {
        proxy_pass http://user-profile:5006/;
        proxy_set_header Host $host;
    }

    # Health check endpoint
    location /nginx-health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
