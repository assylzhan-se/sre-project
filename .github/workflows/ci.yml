name: SRE CI/CD Pipeline

on:
  push:
    branches: [ main, team-1, team-2, team-3 ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Step 1: Build & Test 
  build-and-test:
    name: Build Docker Images & Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 3: Docker build images
      - name: Build Docker images
        run: docker compose build

      # Start services
      - name: Start services
        run: docker compose up -d

      # Wait for services to be ready
      - name: Wait for services
        run: sleep 20

      # Step 5: Testing - health checks
      - name: Health check - Auth Service
        run: curl -f http://localhost:5001/health

      - name: Health check - Product Service
        run: curl -f http://localhost:5002/health

      - name: Health check - Order Service
        run: curl -f http://localhost:5003/health

      - name: Health check - Payment Service
        run: curl -f http://localhost:5004/health

      - name: Health check - Notification Service
        run: curl -f http://localhost:5005/health

      - name: Health check - User Profile Service
        run: curl -f http://localhost:5006/health

      - name: All health checks passed
        run: echo "✅ All 6 microservices are healthy!"

      # Cleanup
      - name: Stop services
        run: docker compose down

  # ── Step 2: Deploy (simulated - runs ansible playbook) ───
  deploy:
    name: Deploy with Ansible
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      # Step 2: Run scripts - ansible
      - name: Run Ansible deploy playbook (dry-run)
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml \
            --connection=local \
            --check \
            -v || echo "Ansible dry-run complete"

      - name: Deploy complete
        run: echo "✅ Deployment pipeline complete!"