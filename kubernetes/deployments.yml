# ─────────────────────────────────────────────────────────────
# Kubernetes Manifests for SRE Microservices
# Apply with: kubectl apply -f kubernetes/
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: Namespace
metadata:
  name: sre-app

---
# ─── Auth Service ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: sre-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      containers:
        - name: auth
          image: sre-auth:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          livenessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 5001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: sre-app
spec:
  selector:
    app: auth
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP

---
# ─── Product Service ──────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: sre-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
    spec:
      containers:
        - name: product
          image: sre-product:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5002
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: sre-app
spec:
  selector:
    app: product
  ports:
    - port: 5002
      targetPort: 5002

---
# ─── Order Service ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: sre-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
        - name: order
          image: sre-order:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5003
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_HOST
            - name: DB_BROKEN
              value: "false"
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: sre-app
spec:
  selector:
    app: order
  ports:
    - port: 5003
      targetPort: 5003

